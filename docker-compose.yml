services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: decisioning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decisioning"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: runtime
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/decisioning
      API_PORT: 3001
      API_WRITE_KEY: local-write-key
      PROTECT_DECIDE: "false"
      API_RUNTIME_ROLE: all
      MEIRO_PIPES_BASE_URL: ${MEIRO_PIPES_BASE_URL:-}
      MEIRO_PIPES_TOKEN: ${MEIRO_PIPES_TOKEN:-}
      MEIRO_PIPES_TOKEN_FILE: ${MEIRO_PIPES_TOKEN_FILE:-/run/secrets/deciengine/meiro_pipes_token}
      MEIRO_PIPES_TIMEOUT_MS: ${MEIRO_PIPES_TIMEOUT_MS:-5000}
      MEIRO_PIPES_CLI_COMMAND: ${MEIRO_PIPES_CLI_COMMAND:-mpcli}
      MEIRO_PRISM_SOURCE_MODE: ${MEIRO_PRISM_SOURCE_MODE:-pipes_cli}
      MPCLI_URL: ${MEIRO_PIPES_BASE_URL:-}
      MPCLI_TOKEN: ${MEIRO_PIPES_TOKEN:-}
      MPCLI_TOKEN_FILE: ${MEIRO_PIPES_TOKEN_FILE:-/run/secrets/deciengine/meiro_pipes_token}
      MEIRO_MODE: mock
      MEIRO_MCP_ENABLED: ${MEIRO_MCP_ENABLED:-false}
      MEIRO_MCP_COMMAND: ${MEIRO_MCP_COMMAND:-uvx}
      MEIRO_MCP_ARGS: ${MEIRO_MCP_ARGS:-meiro-mcp}
      MEIRO_DOMAIN: ${MEIRO_DOMAIN:-https://cdp.store.demo.meiro.io}
      MEIRO_USERNAME: ${MEIRO_USERNAME:-}
      MEIRO_PASSWORD: ${MEIRO_PASSWORD:-}
      MEASUREMENT_API_BASE_URL: ${MEASUREMENT_API_BASE_URL:-http://host.docker.internal:8000}
      MEASUREMENT_API_TIMEOUT_MS: ${MEASUREMENT_API_TIMEOUT_MS:-1500}
      REDIS_URL: redis://redis:6379
      REALTIME_CACHE_TTL_SECONDS: 60
      PROFILE_CACHE_TTL_SECONDS: ${PROFILE_CACHE_TTL_SECONDS:-3600}
      NEXT_PUBLIC_API_BASE_URL: http://api:3001
      NEXT_PUBLIC_API_KEY: local-write-key
      DECISION_DEFAULT_TIMEOUT_MS: 120
      DECISION_DEFAULT_WBS_TIMEOUT_MS: 80
      DECISION_DEFAULT_CACHE_TTL_SECONDS: 60
      DECISION_DEFAULT_STALE_TTL_SECONDS: 1800
      DLQ_WORKER_ENABLED: "true"
      DLQ_POLL_MS: 5000
      DLQ_DUE_LIMIT: 50
      INAPP_V2_WBS_TIMEOUT_MS: 80
      INAPP_V2_CACHE_TTL_SECONDS: 60
      INAPP_V2_STALE_TTL_SECONDS: 1800
      INAPP_V2_CACHE_CONTEXT_KEYS: locale,deviceType
      INAPP_V2_BODY_LIMIT_BYTES: 65536
      INAPP_V2_RATE_LIMIT_PER_APP_KEY: 3000
      INAPP_V2_RATE_LIMIT_WINDOW_MS: 1000
      INAPP_EVENTS_STREAM_KEY: inapp_events
      INAPP_EVENTS_STREAM_GROUP: inapp_events_group
      INAPP_EVENTS_CONSUMER_NAME: api-1
      INAPP_EVENTS_STREAM_MAXLEN: 200000
      INAPP_EVENTS_WORKER_ENABLED: "true"
      INAPP_EVENTS_WORKER_BATCH_SIZE: 500
      INAPP_EVENTS_WORKER_BLOCK_MS: 1000
      INAPP_EVENTS_WORKER_POLL_MS: 250
      INAPP_EVENTS_WORKER_RECLAIM_IDLE_MS: 15000
      INAPP_EVENTS_WORKER_MAX_BATCHES_PER_TICK: 3
      INAPP_EVENTS_WORKER_DEDUPE_TTL_SECONDS: 86400
      RETENTION_WORKER_ENABLED: "true"
      RETENTION_POLL_MS: 21600000
      RETENTION_DECISION_LOGS_DAYS: 30
      RETENTION_STACK_LOGS_DAYS: 30
      RETENTION_INAPP_EVENTS_DAYS: 30
      RETENTION_INAPP_DECISION_LOGS_DAYS: 30
      RETENTION_DECISION_RESULTS_DAYS: 14
      RETENTION_PRECOMPUTE_RUNS_DAYS: 30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./.secrets:/run/secrets/deciengine:ro

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
        NEXT_PUBLIC_API_KEY: local-write-key
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_API_KEY: local-write-key
      E2E_UI_BASE_URL: http://localhost:3000
      E2E_BROWSER_API_BASE_URL: http://localhost:3001
      E2E_API_BASE_URL: http://api:3001
      E2E_API_KEY: local-write-key
      PORT: 3000
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pgdata:
