name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @decisioning/api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Load smoke gate (in-app v2)
        env:
          SMOKE_REQUESTS: "1000"
          SMOKE_CONCURRENCY: "50"
          SMOKE_MAX_P95_MS: "25"
          SMOKE_MIN_CACHE_HIT_RATE: "0.80"
          SMOKE_MAX_FALLBACK_RATE: "0.00"
        run: pnpm --filter @decisioning/api smoke:inapp
